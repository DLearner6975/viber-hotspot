name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Hello @${{ github.actor }}, thank you for opening your first issue in the Viber Hotspot project! 
            
            We appreciate your contribution and will review it as soon as possible. 
            Please make sure you've provided all the necessary information to help us understand and address your issue.
            
            If you have any questions, feel free to ask! 😊
          pr-message: |
            🎉 Congratulations @${{ github.actor }} on opening your first pull request in the Viber Hotspot project!
            
            Thank you for your contribution! Our team will review your changes shortly.
            Please make sure:
            - Your code follows our coding standards
            - All tests pass
            - Your commits have clear, descriptive messages
            
            We're excited to review your work! 🚀
