name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG]: "
labels: ["bug", "needs-triage", "priority/medium"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!
  
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: The application crashes when...
    validations:
      required: true
  
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this bug occur?
      options:
        - Production
        - Development
        - Local
    validations:
      required: true
  
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How severe is this bug?
      options:
        - Low - Minor issue, workaround available
        - Medium - Affects functionality but not critical
        - High - Major issue affecting users
        - Critical - Blocking issue, immediate fix required
    validations:
      required: true
  
  - type: input
    id: browser
    attributes:
      label: Browser (if applicable)
      placeholder: Chrome 121, Safari 17, etc.
  
  - type: textarea
    id: logs
    attributes:
      label: Error Logs or Screenshots
      description: Add any relevant logs, error messages, or screenshots
      placeholder: Paste error logs or drag and drop screenshots here
  
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
